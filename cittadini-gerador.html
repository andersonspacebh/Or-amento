:root{
  --navy:#1C4670;--navy-deep:#11314e;--blue:#3E7CC4;--cyan:#34AED6;--teal:#4BBBBD;
  --line:#e1e9f2;--mist:#f2f6fb;--ink:#23303D;--muted:#5d7186;
  --accent:linear-gradient(105deg,var(--blue),var(--cyan),var(--teal));
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--mist);font-family:"Gilroy",system-ui,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased}

/* header */
.header{background:radial-gradient(120% 90% at 80% -10%,#214f7d 0%,var(--navy) 50%,var(--navy-deep) 100%);
  padding:1.6rem 1.4rem 1.8rem;display:flex;flex-direction:column;align-items:flex-start;gap:.8rem}
.header img.logo{height:34px;width:auto}
.header .badge{display:inline-flex;align-items:center;gap:.5em;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:.35em .85em;
  font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#9cc6e8;font-weight:600}
.header .badge::before{content:"";width:7px;height:7px;border-radius:50%;
  background:var(--accent);flex:none}

/* form */
.page{max-width:520px;margin:0 auto;padding:1.4rem 1rem 5rem}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-bottom:1rem}
.card-head{padding:.9rem 1.15rem;background:var(--navy);color:#fff;
  font-weight:700;font-size:.84rem;letter-spacing:.1em;text-transform:uppercase;
  display:flex;align-items:center;gap:.6rem}
.card-head svg{width:16px;height:16px;flex:none;opacity:.8}
.card-body{padding:1.1rem 1.15rem;display:grid;gap:.85rem}

label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:.3rem}
input,select{width:100%;padding:.78rem 1rem;border:1.5px solid var(--line);border-radius:12px;
  font-family:"Gilroy",system-ui,sans-serif;font-size:1rem;font-weight:500;color:var(--ink);
  background:#fff;appearance:none;-webkit-appearance:none;outline:none;
  transition:border-color .25s,box-shadow .25s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(62,124,196,.13)}
input::placeholder{color:#b0bdc9;font-weight:400}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}

/* select wrapper */
.sel-wrap{position:relative}
.sel-wrap::after{content:"";position:absolute;right:1rem;top:50%;transform:translateY(-50%);
  pointer-events:none;border:5px solid transparent;border-top-color:var(--muted)}
.sel-wrap select{padding-right:2.4rem}

/* pacote buttons */
.pac-opts{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.pac-opt input[type=radio]{display:none}
.pac-opt label{display:flex;align-items:center;justify-content:center;text-align:center;
  padding:.72rem .5rem;border:1.5px solid var(--line);border-radius:12px;
  cursor:pointer;font-size:.88rem;font-weight:600;color:var(--muted);
  transition:.25s;line-height:1.2;letter-spacing:0;text-transform:none}
.pac-opt input:checked + label{border-color:var(--blue);background:rgba(62,124,196,.08);color:var(--navy)}

/* expiry */
.exp-opts{display:flex;gap:.5rem;flex-wrap:wrap}
.exp-opt input[type=radio]{display:none}
.exp-opt label{padding:.5em 1em;border:1.5px solid var(--line);border-radius:100px;
  cursor:pointer;font-size:.9rem;font-weight:600;color:var(--muted);transition:.25s}
.exp-opt input:checked + label{border-color:var(--cyan);background:rgba(52,174,214,.1);color:var(--navy)}

/* resultado */
.result{background:#fff;border:1.5px solid var(--blue);border-radius:20px;padding:1.3rem 1.15rem;
  margin-top:1.2rem;display:none}
.result.show{display:block}
.result .lbl{font-size:.74rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--cyan);font-weight:600;margin-bottom:.6rem}
.result .url-box{background:var(--mist);border:1px solid var(--line);border-radius:12px;
  padding:.75rem 1rem;font-size:.82rem;color:var(--muted);word-break:break-all;
  line-height:1.5;margin-bottom:.9rem;font-weight:400}

/* botões */
.btn-gerar{width:100%;padding:1.05rem;border:none;border-radius:14px;cursor:pointer;
  background:var(--navy);color:#fff;font-family:"Gilroy",system-ui,sans-serif;
  font-size:1.05rem;font-weight:700;letter-spacing:.01em;
  display:flex;align-items:center;justify-content:center;gap:.6em;
  transition:.3s;-webkit-tap-highlight-color:transparent;margin-top:1.2rem}
.btn-gerar:active{transform:scale(.97)}
.btn-gerar svg{width:19px;height:19px}

.btn-copy,.btn-open,.btn-wa{width:100%;padding:.9rem;border-radius:12px;cursor:pointer;
  font-family:"Gilroy",system-ui,sans-serif;font-size:.97rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:.55em;
  transition:.3s;border:none;margin-bottom:.55rem;-webkit-tap-highlight-color:transparent}
.btn-copy{background:var(--mist);border:1.5px solid var(--line);color:var(--navy)}
.btn-copy:active{transform:scale(.97)}
.btn-open{background:rgba(62,124,196,.1);border:1.5px solid rgba(62,124,196,.25);color:var(--navy)}
.btn-wa{background:#25D366;color:#0a3d20}
.btn-wa:active,.btn-open:active{transform:scale(.97)}
.btn-copy svg,.btn-open svg,.btn-wa svg,.btn-gerar svg{width:18px;height:18px;flex:none}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:.7em 1.4em;border-radius:100px;
  font-size:.9rem;font-weight:600;pointer-events:none;opacity:0;
  transition:opacity .3s;z-index:99;white-space:nowrap}
.toast.show{opacity:1}

/* config fixa */
.fixed-note{font-size:.76rem;color:var(--muted);padding:.5rem 1.15rem .9rem;
  line-height:1.5;border-top:1px solid var(--line)}
.fixed-note b{color:var(--ink)}
</style>

  </button>

  <div class="result" id="result">
    <div class="lbl">Link gerado ✓</div>
    <div class="url-box" id="url-box"></div>
    <button class="btn-wa" onclick="abrirWA()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.07 2.88 1.22 3.08.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.62.71.23 1.36.2 1.87.12.57-.08 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35zM12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l5.05-1.33A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
      Enviar via WhatsApp
    </button>
    <button class="btn-open" onclick="abrirProposta()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Abrir proposta
    </button>
    <button class="btn-copy" onclick="copiarLink()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copiar link
    </button>
  </div>
</div>

<div class="toast" id="toast">Link copiado!</div>

<script>
// ── Configuração fixa (mesmo do proposta.html) ──────────────────
var CONFIG_FIXO = {
  consultor:  "Anderson Lima",
  whatsapp:   "55XXXXXXXXXXX",       // ← seu número aqui
  email:      "contato@cittadini.com.br",
  instagram:  "https://instagram.com/cittadinicidadania"
};

// URL base da proposta (ajuste para a URL do Vercel quando fizer deploy)
var URL_PROPOSTA = "https://propostacittadini.vercel.app/cittadini-proposta.html";

var _link = "";

function gerar() {
  var cliente  = document.getElementById("f-cliente").value.trim();
  var pacote   = document.querySelector('input[name="pacote"]:checked').value;
  var parcelas = document.getElementById("f-parcelas").value;
  var valor    = document.getElementById("f-valor").value.trim() || "0,00";
  var total    = document.getElementById("f-total").value.trim() || "0,00";
  var expira   = document.querySelector('input[name="expira"]:checked').value;

  if (!cliente) {
    alert("Preencha o nome do cliente.");
    document.getElementById("f-cliente").focus();
    return;
  }

  var p = new URLSearchParams();
  p.set("cliente",   cliente);
  p.set("pacote",    pacote);
  p.set("parcelas",  parcelas);
  p.set("valor",     valor);
  p.set("total",     total);
  p.set("expira",    expira);
  p.set("consultor", CONFIG_FIXO.consultor);
  p.set("zap",       CONFIG_FIXO.whatsapp);
  p.set("email",     CONFIG_FIXO.email);
  p.set("ig",        CONFIG_FIXO.instagram);

  _link = URL_PROPOSTA + "?" + p.toString();

  document.getElementById("url-box").textContent = _link;
  var r = document.getElementById("result");
  r.classList.add("show");
  r.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function fullLink() {
  // Se _link já é uma URL completa (http...), usa direto. Senão, monta pela pasta atual.
  if (/^https?:\/\//i.test(_link)) return _link;
  var base = window.location.href.split("?")[0].split("#")[0];
  base = base.substring(0, base.lastIndexOf("/") + 1);
  return base + _link;
}

function copiarLink() {
  if (!_link) return;
  var full = fullLink();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(full).then(showToast);
  } else {
    var ta = document.createElement("textarea");
    ta.value = full; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); showToast(); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function abrirProposta() {
  if (!_link) return;
  window.open(fullLink(), "_blank");
}

function abrirWA() {
  if (!_link) return;
  var full = fullLink();
  var cliente = document.getElementById("f-cliente").value.trim() || "cliente";
  var msg = "Olá, " + cliente + "! 🌟\n\nPreparei uma proposta personalizada para você da Cittadini Cidadania Europeia.\n\n👉 " + full + "\n\nQualquer dúvida, estou à disposição!";
  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}

function showToast() {
  var t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

// Auto-calcula o total quando muda parcelas ou valor
function calcTotal() {
  var sel = document.getElementById("f-parcelas").value;
  var n = parseInt(sel.replace("×",""), 10);
  var v = parseFloat(document.getElementById("f-valor").value.replace(".","").replace(",",".")) || 0;
  if (!isNaN(n) && v > 0) {
    var t = (n * v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    document.getElementById("f-total").value = t;
  }
}
document.getElementById("f-parcelas").addEventListener("change", calcTotal);
document.getElementById("f-valor").addEventListener("blur", calcTotal);
</script>
</body>
</html>
